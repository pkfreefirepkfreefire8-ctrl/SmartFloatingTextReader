name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT="$GITHUB_WORKSPACE/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT"
          wget -O cmdline-tools.zip "https://dl.google.com/android/repository/commandline-tools-latest-linux.zip" -q
          unzip -o cmdline-tools.zip -d "$ANDROID_SDK_ROOT"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/"* "$ANDROID_SDK_ROOT/cmdline-tools/latest/" 2>/dev/null || true
          rmdir "$ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools" 2>/dev/null || true
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          yes | $ANDROID_SDK_ROOT/cmdline-toos/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --install "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            wget -O gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.5/gradle/wrapper/gradle-wrapper.jar" -q
          fi
          if [ ! -f gradlew ]; then
            echo '#!/bin/bash' > gradlew
            echo 'exec java -jar gradle/wrapper/gradle-wrapper.jar "$@"' >> gradlew
            chmod +x gradlew
          else
            chmod +x gradlew
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SmartReader-APK
          path: app/build/outputs/apk/debug/app-debug.apk
